<!-- ============================================ -->
<!--                 Trusted By                   -->
<!-- ============================================ -->

{% assign logos = site.trusted_by | sort: "position" %}
{% if logos.size > 0 %}
<section id="trusted-by">
    <div class="cs-container">
        <span class="cs-topper">Trusted by teams at</span>
        <div class="cs-track-wrapper">
            <div class="cs-track">
                {% for item in logos %}
                <div class="cs-logo-item">
                    <img src="{{ site.baseurl }}{{ item.logo }}" alt="{{ item.title }}" loading="lazy" decoding="async">
                </div>
                {% endfor %}
                <!-- Duplicate for seamless loop -->
                {% for item in logos %}
                <div class="cs-logo-item">
                    <img src="{{ site.baseurl }}{{ item.logo }}" alt="{{ item.title }}" loading="lazy" decoding="async" aria-hidden="true">
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
{% endif %}

<script>
(function() {
  var track = document.querySelector('#trusted-by .cs-track');
  if (!track) return;
  var items = track.children;
  var half = items.length / 2;
  // Measure the width of the first half of items (original set) plus their gaps
  var width = 0;
  for (var i = 0; i < half; i++) {
    width += items[i].offsetWidth;
  }
  // Add gaps between items (half items = half gaps for the first set)
  var gap = parseFloat(getComputedStyle(track).columnGap) || 0;
  width += half * gap;
  track.style.setProperty('--scroll-dist', '-' + width + 'px');
})();
</script>
